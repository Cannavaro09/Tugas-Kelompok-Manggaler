<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pembayaran QRIS</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

.container{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    width:350px;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:center;
}

.card h1{
    margin-top:10px;
    color:#e60023;
}

.card p{
    color:#555;
    margin-bottom:20px;
}

.qris{
    width:100%;
    border-radius:10px;
}

.btn{
    margin-top:20px;
    display:inline-block;
    background:#e60023;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#b8001c;
}

</style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>Pembayaran QRIS</h1>

        <p>Scan QRIS di bawah untuk melakukan pembayaran</p>

        <img src="qrisdeco.png" class="qris">

        <a href="sukses.html" class="btn">Sudah Bayar</a>

    </div>
</div>

</body>
</html>

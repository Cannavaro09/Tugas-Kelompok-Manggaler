<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pembayaran</title>

<style>
body { font-family:Arial; margin:0; background:#f4f4f4; }

.header {
    background:red;
    color:white;
    padding:15px;
    text-align:center;
}

.container { padding:20px; }

.metode {
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    cursor:pointer;
    border:2px solid transparent;
    transition:0.2s;
}

.metode:hover {
    border:2px solid red;
}

.metode.selected {
    background:#4da6ff;
    color:white;
    border:2px solid #4da6ff;
}
button {
    width:100%;
    padding:12px;
    background:red;
    color:white;
    border:none;
    border-radius:5px;
    margin-top:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">PEMBAYARAN</div>

<div class="container">
    <h3>Total: Rp <span id="total"></span></h3>

    <div class="metode" onclick="pilih(this, 'Dana')">Dana</div>
    <div class="metode" onclick="pilih(this, 'Gopay')">Gopay</div>
    <div class="metode" onclick="pilih(this, 'BCA')">BCA</div>
	<div class="metode" onclick="pilih(this, 'BRI')">BRI</div>
	<div class="metode" onclick="pilih(this, 'SEABANK')">SEABANK</div>

    <button onclick="bayar()">Bayar Sekarang</button>
</div>

<script>
let metode = "";

document.getElementById("total").innerText = localStorage.getItem("totalBayar");

function pilih(element, nama){
    metode = nama;

    let semua = document.querySelectorAll('.metode');
    semua.forEach(el => el.classList.remove('selected'));

    element.classList.add('selected');
}
function bayar(){
    if(metode === ""){
        alert("Pilih metode dulu!");
    } else {
        localStorage.setItem("metodeBayar", metode);
        window.location.href = "pembayaran.html";
    }
}
</script>

</body>
</html>
